# Run `pre-commit install` once to enable these hooks on commit.
# To normalize the whole repo in one go: `pre-commit run --all-files`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.4
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        name: ruff (format)
        files: ^backend/

  - repo: local
    hooks:
      - id: prettier
        name: prettier (frontend)
        entry: npm --prefix frontend run format
        language: system
        pass_filenames: false
        files: ^frontend/.*\.(jsx?|css|json)$
